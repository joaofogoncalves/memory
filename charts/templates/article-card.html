<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Article Card</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --cyan-500: #44d8f1;
  --bg: #0e131e;
  --text: #f4f7fc;
  --text-muted: #c9d2e0;
  --font-sans: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
  --font-display: "Space Grotesk", "Inter", sans-serif;
}
html, body {
  margin: 0; padding: 0; background: var(--bg);
  font-family: var(--font-sans); color: var(--text);
  -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
}
#chart-container {
  position: relative;
  width: 100vw; height: 100vh;
  overflow: hidden;
  background: var(--bg);
  display: flex; align-items: center;
}
.hero {
  position: absolute; inset: 0;
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  z-index: 0;
}
.scrim {
  position: absolute; inset: 0;
  z-index: 1;
  background:
    linear-gradient(90deg, rgba(14,19,30,0.85) 0%, rgba(14,19,30,0.45) 55%, rgba(14,19,30,0.15) 90%),
    linear-gradient(180deg, rgba(14,19,30,0.22) 0%, rgba(14,19,30,0.32) 100%);
}
.content {
  position: relative;
  z-index: 2;
  padding: 0 64px;
  display: flex; flex-direction: column; gap: 32px;
  width: 100%;
  box-sizing: border-box;
}
.title {
  font-family: var(--font-display);
  font-size: 96px; font-weight: 700; line-height: 1.05;
  letter-spacing: -0.02em;
  color: var(--text);
  margin: 0;
  text-shadow: 0 2px 24px rgba(14,19,30,0.45);
}
.subtitle {
  font-size: 42px; font-weight: 400; line-height: 1.3;
  color: var(--text-muted);
  margin: 0;
  max-width: 1240px;
  text-shadow: 0 2px 16px rgba(14,19,30,0.45);
}
.title.size-xl  { font-size: 116px; }
.title.size-l   { font-size: 104px; }
.title.size-m   { font-size: 80px; }
.title.size-s   { font-size: 64px; }
.subtitle.size-s { font-size: 34px; }
/* Bottom-right scrim guarantees signature legibility on bright heroes */
.sig-scrim {
  position: absolute; right: 0; bottom: 0;
  width: 640px; height: 180px;
  z-index: 1;
  background: linear-gradient(135deg, transparent 0%, rgba(14,19,30,0.55) 55%, rgba(14,19,30,0.85) 100%);
  pointer-events: none;
}
</style>
</head>
<body>
<div id="chart-container">
  <div class="hero" id="hero"></div>
  <div class="scrim"></div>
  <div class="sig-scrim"></div>
  <div class="content">
    <h1 class="title" id="title"></h1>
    <p class="subtitle" id="subtitle"></p>
  </div>
</div>
<script>
const d = window.__DATA__ || {};
const assets = d.assets || {};

const hero = document.getElementById('hero');
if (assets.hero) hero.style.backgroundImage = `url("${assets.hero}")`;

const titleEl = document.getElementById('title');
const subtitleEl = document.getElementById('subtitle');
const title = d.title || '';
const subtitle = d.subtitle || '';
titleEl.textContent = title;
subtitleEl.textContent = subtitle;

// Adapt title size to length so it fits cleanly without manual tweaks
if (title.length > 80) titleEl.classList.add('size-s');
else if (title.length > 55) titleEl.classList.add('size-m');
else if (title.length < 22) titleEl.classList.add('size-xl');
else if (title.length < 36) titleEl.classList.add('size-l');

if (subtitle.length > 140) subtitleEl.classList.add('size-s');

if (!subtitle) subtitleEl.style.display = 'none';
</script>
</body>
</html>
