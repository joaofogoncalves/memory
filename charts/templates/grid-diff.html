<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Grid Diff</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --cyan-500: #44d8f1; --coral: #ff8a9e;
  --bg: #0e131e; --surface-1: #171b27; --surface-2: #1b1f2b;
  --border: #3c494c; --text: #dee2f2; --text-muted: #bbc9cc;
  --font-sans: "Inter", -apple-system, sans-serif;
  --font-display: "Space Grotesk", "Inter", sans-serif;
  --font-mono: "JetBrains Mono", ui-monospace, monospace;
}
html, body { margin: 0; padding: 0; background: var(--bg); font-family: var(--font-sans); color: var(--text); -webkit-font-smoothing: antialiased; }
#chart-container {
  width: 100vw;
  padding: 36px 40px; box-sizing: border-box;
  background: var(--bg);
  display: flex; flex-direction: column; gap: 24px;
}
.title { font-family: var(--font-display); font-size: 34px; font-weight: 700; letter-spacing: -0.01em; margin: 0; }
.subtitle { font-size: 18px; font-weight: 400; color: var(--text-muted); margin: 0; max-width: 1000px; line-height: 1.4; }
.diff { flex: 1; display: grid; grid-template-columns: 1fr auto 1fr; gap: 36px; align-items: start; }
.side { display: flex; flex-direction: column; gap: 16px; }
.side-header {
  font-family: var(--font-display);
  font-size: 14px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.12em;
  color: var(--text-muted); margin: 0;
}
.side-count {
  font-family: var(--font-display);
  font-size: 52px; font-weight: 700; line-height: 1;
  letter-spacing: -0.02em; margin: 0; color: var(--text);
}
.side.right .side-count { color: var(--cyan-500); }
.grid {
  display: grid;
  grid-template-columns: repeat(var(--cols, 3), minmax(0, 1fr));
  gap: 10px;
}
.cell {
  background: var(--surface-1);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px 18px;
  font-family: var(--font-mono);
  font-size: 15px; color: var(--text);
  min-height: 56px;
  display: flex; flex-direction: column; justify-content: center; align-items: flex-start; gap: 2px;
}
.cell.new {
  background: rgba(68, 216, 241, 0.08);
  border-color: var(--cyan-500);
  color: var(--cyan-500);
  font-weight: 500;
}
.cell .note {
  display: block; font-size: 12px; color: var(--text-muted);
  margin-top: 2px; font-family: var(--font-sans); font-weight: 400;
}
.cell.new .note { color: var(--text-muted); }
.arrow {
  display: flex; align-items: center; justify-content: center; padding-top: 40px;
}
.arrow svg { width: 60px; height: 20px; }
.caption { font-size: 13px; color: var(--text-muted); margin: 0; }
</style>
</head>
<body>
<div id="chart-container">
  <h1 class="title" id="title"></h1>
  <p class="subtitle" id="subtitle"></p>
  <div class="diff">
    <div class="side left">
      <p class="side-header" id="leftHeader"></p>
      <p class="side-count" id="leftCount"></p>
      <div class="grid" id="leftGrid"></div>
    </div>
    <div class="arrow">
      <svg viewBox="0 0 60 20" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M2 10 H50" stroke="#bbc9cc" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M44 3 L56 10 L44 17" stroke="#bbc9cc" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg>
    </div>
    <div class="side right">
      <p class="side-header" id="rightHeader"></p>
      <p class="side-count" id="rightCount"></p>
      <div class="grid" id="rightGrid"></div>
    </div>
  </div>
  <p class="caption" id="caption"></p>
</div>
<script>
const d = window.__DATA__ || {};
document.getElementById('title').textContent = d.title || '';
document.getElementById('subtitle').textContent = d.subtitle || '';
document.getElementById('caption').textContent = d.caption || '';
const l = d.left || {}, r = d.right || {};
document.getElementById('leftHeader').textContent  = l.header || '';
document.getElementById('rightHeader').textContent = r.header || '';
document.getElementById('leftCount').textContent   = l.count ?? '';
document.getElementById('rightCount').textContent  = r.count ?? '';

const cols = d.columns || 3;
document.getElementById('leftGrid').style.setProperty('--cols', cols);
document.getElementById('rightGrid').style.setProperty('--cols', cols);

function render(grid, items) {
  (items || []).forEach(it => {
    const item = typeof it === 'string' ? { label: it } : it;
    const c = document.createElement('div');
    c.className = 'cell' + (item.isNew ? ' new' : '');
    const lbl = document.createElement('span');
    lbl.className = 'label';
    lbl.textContent = item.label || '';
    c.appendChild(lbl);
    if (item.note) {
      const n = document.createElement('span'); n.className = 'note'; n.textContent = item.note;
      c.appendChild(n);
    }
    grid.appendChild(c);
  });
}
render(document.getElementById('leftGrid'),  l.items);
render(document.getElementById('rightGrid'), r.items);
</script>
</body>
</html>
