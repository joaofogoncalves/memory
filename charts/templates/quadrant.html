<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Quadrant</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --cyan-500: #44d8f1; --lav-500: #bdc2ff; --coral: #ff8a9e;
  --bg: #0e131e; --surface-1: #171b27; --surface-2: #1b1f2b;
  --border: #3c494c; --border-strong: #869396;
  --text: #dee2f2; --text-muted: #bbc9cc;
  --font-sans: "Inter", -apple-system, sans-serif;
  --font-display: "Space Grotesk", "Inter", sans-serif;
}
html, body { margin: 0; padding: 0; background: var(--bg); font-family: var(--font-sans); color: var(--text); -webkit-font-smoothing: antialiased; }
#chart-container {
  width: 100vw; min-height: 100vh;
  padding: 40px 52px; box-sizing: border-box;
  background: var(--bg);
  display: flex; flex-direction: column; gap: 16px;
}
.title { font-family: var(--font-display); font-size: 48px; font-weight: 700; letter-spacing: -0.01em; line-height: 1.12; margin: 0; }
.subtitle { font-size: 22px; font-weight: 400; color: var(--text-muted); margin: 0; max-width: 1000px; line-height: 1.4; }
.diagram-wrap { flex: 1; display: flex; align-items: center; justify-content: center; min-height: 0; }
svg { max-width: 100%; max-height: 100%; }
.caption { font-size: 15px; color: var(--text-muted); margin: 0; }
</style>
</head>
<body>
<div id="chart-container">
  <h1 class="title" id="title"></h1>
  <p class="subtitle" id="subtitle"></p>
  <div class="diagram-wrap"><svg id="svg" viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg"></svg></div>
  <p class="caption" id="caption"></p>
</div>
<script>
const d = window.__DATA__ || {};
document.getElementById('title').textContent = d.title || '';
const subEl = document.getElementById('subtitle');
subEl.textContent = d.subtitle || '';
if (!d.subtitle) subEl.style.display = 'none';
const capEl = document.getElementById('caption');
capEl.textContent = d.caption || '';
if (!d.caption) capEl.style.display = 'none';

const svg = document.getElementById('svg');
const xLabel = d.xAxis || { low: 'Low', high: 'High', title: '' };
const yLabel = d.yAxis || { low: 'Low', high: 'High', title: '' };
const q = d.quadrants || { tl: {}, tr: {}, bl: {}, br: {} };

const NS = 'http://www.w3.org/2000/svg';
const ox = 140, oy = 16, w = 1010, h = 470;
const cx = ox + w / 2, cy = oy + h / 2;

const displayFont = '"Space Grotesk", "Inter", sans-serif';
const bodyFont = '"Inter", sans-serif';

// Per-quadrant tone: 'good' (cyan), 'bad' (coral), or 'neutral'. Defaults are
// positional (tr=good, br=bad, everything else neutral) so existing specs render
// unchanged; any quadrant can override by setting `tone` in its data.
const TONES = {
  good:    { fill: '#17242a', label: '#44d8f1' },
  bad:     { fill: '#241820', label: '#ff8a9e' },
  neutral: { fill: '#171b27', label: '#bbc9cc' },
};
function toneKey(key, data) {
  if (data && data.tone && TONES[data.tone]) return data.tone;
  if (key === 'tr') return 'good';
  if (key === 'br') return 'bad';
  return 'neutral';
}
const fills = {
  tl: TONES[toneKey('tl', q.tl)].fill,
  tr: TONES[toneKey('tr', q.tr)].fill,
  bl: TONES[toneKey('bl', q.bl)].fill,
  br: TONES[toneKey('br', q.br)].fill,
};
const bgRects = [
  { x: ox, y: oy, w: w/2, h: h/2, fill: fills.tl },
  { x: cx, y: oy, w: w/2, h: h/2, fill: fills.tr },
  { x: ox, y: cy, w: w/2, h: h/2, fill: fills.bl },
  { x: cx, y: cy, w: w/2, h: h/2, fill: fills.br },
];
bgRects.forEach(r => {
  const el = document.createElementNS(NS, 'rect');
  el.setAttribute('x', r.x); el.setAttribute('y', r.y);
  el.setAttribute('width', r.w); el.setAttribute('height', r.h);
  el.setAttribute('fill', r.fill);
  el.setAttribute('rx', 8);
  svg.appendChild(el);
});

const outer = document.createElementNS(NS, 'rect');
outer.setAttribute('x', ox); outer.setAttribute('y', oy);
outer.setAttribute('width', w); outer.setAttribute('height', h);
outer.setAttribute('fill', 'none');
outer.setAttribute('stroke', '#3c494c');
outer.setAttribute('stroke-width', '1.5');
outer.setAttribute('rx', '8');
svg.appendChild(outer);

function line(x1, y1, x2, y2, stroke = '#3c494c', width = 1) {
  const l = document.createElementNS(NS, 'line');
  l.setAttribute('x1', x1); l.setAttribute('y1', y1);
  l.setAttribute('x2', x2); l.setAttribute('y2', y2);
  l.setAttribute('stroke', stroke); l.setAttribute('stroke-width', width);
  svg.appendChild(l);
}
line(cx, oy, cx, oy + h);
line(ox, cy, ox + w, cy);

const cellW = w / 2, cellH = h / 2;
// Title + description are centered within each quadrant. The title is larger,
// with a small vertical gap before the body text; the whole block is centered
// vertically in the cell.
function quadLabel(cellLeft, cellTop, data, color) {
  if (!data) return;
  const cxCell = cellLeft + cellW / 2;
  const titleSize = 48, descSize = 26, descLineH = 34, gap = 20;

  let lines = [];
  if (data.description) {
    const words = data.description.split(' ');
    lines = [''];
    const maxLen = 24;
    for (const wd of words) {
      if ((lines[lines.length - 1] + ' ' + wd).trim().length > maxLen) lines.push(wd);
      else lines[lines.length - 1] = (lines[lines.length - 1] + ' ' + wd).trim();
    }
  }

  const descBlockH = lines.length ? gap + descSize + (lines.length - 1) * descLineH : 0;
  const blockH = titleSize + descBlockH;
  const titleBaseline = cellTop + (cellH - blockH) / 2 + titleSize;

  const tLabel = document.createElementNS(NS, 'text');
  tLabel.setAttribute('x', cxCell);
  tLabel.setAttribute('y', titleBaseline);
  tLabel.setAttribute('text-anchor', 'middle');
  tLabel.setAttribute('font-family', displayFont);
  tLabel.setAttribute('font-size', titleSize);
  tLabel.setAttribute('font-weight', '700');
  tLabel.setAttribute('fill', color);
  tLabel.textContent = data.label || '';
  svg.appendChild(tLabel);

  if (lines.length) {
    const tDesc = document.createElementNS(NS, 'text');
    tDesc.setAttribute('x', cxCell);
    tDesc.setAttribute('y', titleBaseline + gap + descSize);
    tDesc.setAttribute('text-anchor', 'middle');
    tDesc.setAttribute('font-family', bodyFont);
    tDesc.setAttribute('font-size', descSize);
    tDesc.setAttribute('fill', '#dee2f2');
    lines.forEach((line, i) => {
      const ts = document.createElementNS(NS, 'tspan');
      ts.setAttribute('x', cxCell);
      ts.setAttribute('dy', i === 0 ? 0 : descLineH);
      ts.textContent = line;
      tDesc.appendChild(ts);
    });
    svg.appendChild(tDesc);
  }
}
quadLabel(ox, oy, q.tl, TONES[toneKey('tl', q.tl)].label);
quadLabel(cx, oy, q.tr, TONES[toneKey('tr', q.tr)].label);
quadLabel(ox, cy, q.bl, TONES[toneKey('bl', q.bl)].label);
quadLabel(cx, cy, q.br, TONES[toneKey('br', q.br)].label);

function axisText(x, y, text, opts = {}) {
  const t = document.createElementNS(NS, 'text');
  t.setAttribute('x', x); t.setAttribute('y', y);
  t.setAttribute('font-family', opts.display ? displayFont : bodyFont);
  t.setAttribute('font-size', opts.size || '13');
  t.setAttribute('font-weight', opts.weight || '500');
  t.setAttribute('fill', opts.fill || '#bbc9cc');
  t.setAttribute('text-anchor', opts.anchor || 'start');
  if (opts.transform) t.setAttribute('transform', opts.transform);
  t.textContent = text;
  svg.appendChild(t);
}
axisText(cx, oy + h + 52, xLabel.title || '', { anchor: 'middle', size: '26', weight: '600', fill: '#dee2f2', display: true });
axisText(ox, oy + h + 52, xLabel.low || '', { anchor: 'start', size: '24' });
axisText(ox + w, oy + h + 52, xLabel.high || '', { anchor: 'end', size: '24' });
axisText(ox - 68, cy, yLabel.title || '', { anchor: 'middle', size: '26', weight: '600', fill: '#dee2f2', display: true, transform: `rotate(-90 ${ox - 68} ${cy})` });
axisText(ox - 22, oy + 18, yLabel.high || '', { anchor: 'end', size: '24' });
axisText(ox - 22, oy + h, yLabel.low || '', { anchor: 'end', size: '24' });
</script>
</body>
</html>
