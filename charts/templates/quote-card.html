<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Quote Card</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --cyan-500: #44d8f1;
  --bg: #0e131e;
  --text: #f4f7fc;
  --text-muted: #bbc9cc;
  --text-faint: #869396;
  --font-sans: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
  --font-display: "Space Grotesk", "Inter", sans-serif;
}
html, body {
  margin: 0; padding: 0; background: var(--bg);
  font-family: var(--font-sans); color: var(--text);
  -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
}
#chart-container {
  position: relative;
  width: 100vw; height: 100vh;
  overflow: hidden;
  background:
    radial-gradient(1200px 800px at 18% 22%, rgba(68,216,241,0.08) 0%, rgba(68,216,241,0) 60%),
    radial-gradient(900px 600px at 88% 88%, rgba(189,194,255,0.05) 0%, rgba(189,194,255,0) 60%),
    var(--bg);
  display: flex; flex-direction: column; justify-content: center;
  padding: 96px 120px 112px;
  box-sizing: border-box;
  gap: 56px;
}
.header {
  display: flex; align-items: center; gap: 24px;
}
.avatar {
  width: 120px; height: 120px;
  border-radius: 999px;
  background: var(--text-faint);
  background-size: cover; background-position: center;
  flex: 0 0 auto;
  box-shadow: 0 0 0 1px rgba(255,255,255,0.06);
}
.identity {
  display: flex; flex-direction: column; gap: 4px;
}
.name {
  font-family: var(--font-display);
  font-size: 50px; font-weight: 600;
  letter-spacing: -0.01em; line-height: 1.15;
  color: var(--text);
  margin: 0;
}
.handle {
  font-size: 33px; font-weight: 400;
  color: var(--text-muted);
  margin: 0; line-height: 1.2;
}
.quote {
  font-family: var(--font-display);
  font-size: 64px; font-weight: 600; line-height: 1.18;
  letter-spacing: -0.015em;
  color: var(--text);
  margin: 0;
  text-wrap: balance;
}
.quote.size-xl { font-size: 76px; }
.quote.size-l  { font-size: 64px; }
.quote.size-m  { font-size: 52px; }
.quote.size-s  { font-size: 40px; }
.quote.size-xs { font-size: 32px; line-height: 1.22; }
</style>
</head>
<body>
<div id="chart-container">
  <div class="header">
    <div class="avatar" id="avatar"></div>
    <div class="identity">
      <p class="name" id="name"></p>
      <p class="handle" id="handle"></p>
    </div>
  </div>
  <p class="quote" id="quote"></p>
</div>
<script>
const d = window.__DATA__ || {};
const assets = d.assets || {};

// Avatar (passed via --asset avatar=<path>; falls back to a flat circle)
const avatarEl = document.getElementById('avatar');
if (assets.avatar) avatarEl.style.backgroundImage = `url("${assets.avatar}")`;

// Name (accept `name` or legacy `attribution`/`author`)
const name = d.name || d.attribution || d.author || '';
const nameEl = document.getElementById('name');
nameEl.textContent = name;
if (!name) nameEl.style.display = 'none';

// Handle (e.g. "@joaofogoncalves") — auto-prepend @ if missing
const handleEl = document.getElementById('handle');
const rawHandle = (d.handle || '').trim();
const handle = rawHandle && !rawHandle.startsWith('@') ? `@${rawHandle}` : rawHandle;
handleEl.textContent = handle;
if (!handle) handleEl.style.display = 'none';

// Hide whole header if neither avatar, name, nor handle exists
if (!assets.avatar && !name && !handle) {
  document.querySelector('.header').style.display = 'none';
}

// Quote — shown verbatim (no auto curly-quote wrap; the avatar+name carries
// attribution, so quote marks are no longer needed for the framing)
const quote = d.quote || '';
const quoteEl = document.getElementById('quote');
quoteEl.textContent = quote;

// Adapt size to length
const len = quote.length;
if (len <= 80)        quoteEl.classList.add('size-xl');
else if (len <= 140)  quoteEl.classList.add('size-l');
else if (len <= 220)  quoteEl.classList.add('size-m');
else if (len <= 320)  quoteEl.classList.add('size-s');
else                  quoteEl.classList.add('size-xs');
</script>
</body>
</html>
