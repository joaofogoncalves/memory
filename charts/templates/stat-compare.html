<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Stat Compare</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --cyan-500: #44d8f1; --cyan-700: #00bcd4;
  --coral: #ff8a9e;
  --bg: #0e131e; --surface-1: #1b1f2b; --surface-2: #252a36;
  --border: #3c494c; --text: #dee2f2; --text-muted: #bbc9cc;
  --font-sans: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
  --font-display: "Space Grotesk", "Inter", sans-serif;
}
html, body { margin: 0; padding: 0; background: var(--bg); font-family: var(--font-sans); color: var(--text); -webkit-font-smoothing: antialiased; }
#chart-container {
  width: 100vw; min-height: 100vh;
  padding: 56px 72px; box-sizing: border-box;
  background: var(--bg);
  display: flex; flex-direction: column; gap: 40px;
}
.header { display: flex; flex-direction: column; gap: 12px; }
.title { font-family: var(--font-display); font-size: 34px; font-weight: 700; letter-spacing: -0.01em; margin: 0; }
.subtitle { font-size: 18px; font-weight: 400; color: var(--text-muted); margin: 0; max-width: 900px; line-height: 1.4; }
.compare { flex: 1; display: grid; grid-template-columns: 1fr auto 1fr; gap: 32px; align-items: stretch; }
.card {
  background: var(--surface-1);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 40px 48px;
  display: flex; flex-direction: column; justify-content: center; gap: 16px;
  position: relative;
  overflow: hidden;
}
.card::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
}
.card.left::before  { background: var(--cyan-500); }
.card.right::before { background: var(--coral); }
.card-label {
  font-family: var(--font-display);
  font-size: 13px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.1em;
  color: var(--text-muted);
  margin: 0;
}
.card.left  .card-label { color: var(--cyan-500); }
.card.right .card-label { color: var(--coral); }
.big-number {
  font-family: var(--font-display);
  font-size: 104px; font-weight: 700; line-height: 1;
  letter-spacing: -0.03em; margin: 0;
}
.card.left  .big-number { color: var(--cyan-500); }
.card.right .big-number { color: var(--coral); }
.card-desc { font-size: 17px; color: var(--text); line-height: 1.45; margin: 0; max-width: 420px; }
.arrow {
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-display);
  font-size: 13px; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 0.14em; font-weight: 600;
  position: relative; min-width: 120px;
}
.arrow svg { width: 80px; height: 24px; }
.arrow-label { position: absolute; top: calc(50% - 36px); white-space: nowrap; }
.caption { font-size: 13px; color: var(--text-muted); margin: 0; }
</style>
</head>
<body>
<div id="chart-container">
  <div class="header">
    <h1 class="title" id="title"></h1>
    <p class="subtitle" id="subtitle"></p>
  </div>
  <div class="compare">
    <div class="card left">
      <p class="card-label" id="leftLabel"></p>
      <p class="big-number" id="leftValue"></p>
      <p class="card-desc" id="leftDesc"></p>
    </div>
    <div class="arrow">
      <span class="arrow-label" id="arrowLabel"></span>
      <svg viewBox="0 0 80 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M2 12 H70" stroke="#bbc9cc" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M62 4 L74 12 L62 20" stroke="#bbc9cc" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg>
    </div>
    <div class="card right">
      <p class="card-label" id="rightLabel"></p>
      <p class="big-number" id="rightValue"></p>
      <p class="card-desc" id="rightDesc"></p>
    </div>
  </div>
  <p class="caption" id="caption"></p>
</div>
<script>
const d = window.__DATA__ || {};
document.getElementById('title').textContent = d.title || '';
document.getElementById('subtitle').textContent = d.subtitle || '';
document.getElementById('caption').textContent = d.caption || '';
document.getElementById('arrowLabel').textContent = d.arrowLabel || '';
const l = d.left || {}, r = d.right || {};
document.getElementById('leftLabel').textContent = l.label || '';
document.getElementById('leftValue').textContent = l.value || '';
document.getElementById('leftDesc').textContent = l.description || '';
document.getElementById('rightLabel').textContent = r.label || '';
document.getElementById('rightValue').textContent = r.value || '';
document.getElementById('rightDesc').textContent = r.description || '';
</script>
</body>
</html>
