# LinkedIn API settings (used with --auth / --reauth path)
linkedin:
  api_version: v2
  rate_limit_delay: 1.5    # seconds between API requests
  max_retries: 3           # retry count on rate-limit errors
  timeout: 30              # HTTP request timeout in seconds

# Post output settings
output:
  base_dir: posts          # directory for archived posts (relative or absolute)
  date_format: "%Y/%m"     # subdirectory structure under base_dir

# Media download settings
media:
  download_images: true
  download_videos: true
  download_documents: true
  max_video_size_mb: 500   # skip videos larger than this

# Browser crawler settings (primary method, used with --fetch)
browser:
  profile_dir: cache/browser_profile   # persistent login session
  scroll_delay_min: 5.0    # min seconds between scroll actions
  scroll_delay_max: 12.0   # max seconds between scroll actions
  action_delay_min: 1.5    # min seconds between click actions
  action_delay_max: 4.0    # max seconds between click actions
  max_stale_scrolls: 10    # stop after N scrolls with no new posts

# Logging
logging:
  level: INFO              # DEBUG for verbose output
  file: logs/scraper.log
