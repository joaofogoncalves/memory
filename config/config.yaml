linkedin:
  api_version: v2
  rate_limit_delay: 1.5  # seconds between requests
  max_retries: 3
  timeout: 30

output:
  base_dir: posts  # Relative to project root, or use absolute path
  date_format: "%Y/%m"

media:
  download_images: true
  download_videos: true
  download_documents: true
  max_video_size_mb: 500

browser:
  profile_dir: cache/browser_profile
  scroll_delay_min: 3.0
  scroll_delay_max: 8.0
  action_delay_min: 1.0
  action_delay_max: 3.0
  max_stale_scrolls: 5

logging:
  level: INFO
  file: logs/scraper.log
